  <body class="fondo-login">
    <div class="lluvia"></div>

        <form id="form-login" class="login-form">
  <h1>Acceso Clientes</h1>

  <div class="input-group">
    <label for="email">Email</label>
    <input id="txt-email" type="email" required placeholder="ejemplo@correo.com" />
  </div>

  <div class="input-group">
    <label for="password">Contraseña</label>
    <input id="txt-password" type="password" required placeholder="********" />
  </div>

  <div class="btn-dropdown-wrapper">
    <button type="submit" class="btn-principal">Ingresar</button>
    
    <div class="dropdown-content">
        <p>¿No eres miembro?</p>
        <a href="registro.html">Regístrate</a>
        <hr class="linea-terminos">
        <a href="#">Términos y condiciones</a>
    </div>
  </div>
</form>
      </div>
    </main>

    <footer> </footer>
    <script src="../js/login.js"></script>
    <script src="../js/layout.js"></script>
