<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ImpulsAR</title>
    <link rel="icon" type="image/png" href="../assets/favicon/favicon-32x32.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/login.css">
  </head>

  <body class="Fondo">
    <header></header>

    <main>
      <div class="login">
        <form id="form-login">
          <h1>Acceso Clientes</h1>
          
          <div class="Email">
            <label>Email</label>
            <input type="email" id="txt-email" required placeholder="ejemplo@correo.com">
          </div>

          <div class="Contraseña">
            <label>Contraseña</label>
            <input type="password" id="txt-password" required placeholder="********">
          </div>

          <button type="submit">Ingresar</button>
        </form>
      </div>
    </main>

    <footer></footer>

    <script src="../js/layout.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
