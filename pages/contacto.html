<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - ImpulsAR</title>
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="../assets/favicon/site.webmanifest">
    <!-------------->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/contacto.css">
</head>

<body>

<div class="background"></div>

<header></header>

<main>

    <h1 class="typing-text">Contacto</h1>

    <section class="faq-contact">
        <div class="contact-box">

            <h3>Escribinos</h3>
            <p>Dejanos tu mensaje y te responderemos lo antes posible.</p>

            <!-- MENSAJE OCULTO -->
            <p id="mensaje-exito" style="display:none; color:#B5529F; font-weight:bold;">
                ✅ Ya recibimos tu mensaje, te responderemos en breve.
            </p>

            <form class="contact-form" id="form-contacto">

                <input type="text" placeholder="Nombre" required>
                <input type="text" placeholder="Apellido" required>
                <input type="email" placeholder="Email" required>
                <textarea placeholder="Escribí tu mensaje..." rows="5" required></textarea>

                <button type="submit" class="btn-submit">
                    Enviar mensaje
                </button>

                <button type="reset" class="btn-submit">
                    Limpiar
                </button>

            </form>

        </div>
    </section>

</main>

    <footer> </footer>

    <script type="module" src="../js/contacto.js"></script>
    <script src="../js/layout.js"></script>
</body>
</html>
