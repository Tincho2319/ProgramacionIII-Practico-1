<!doctype html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrarse - ImpulsAR</title>
    <meta name="description" content="Registrarse - ImpulsAR" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Fira+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/registro.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="registro-body">
    <div class="lluvia"></div>

<header> </header>

    <main class="registro-main">
        <div class="registro-container">
            <form id="registro-form" class="registro-form">
                <h1>Crear nueva cuenta</h1>
                
                <div class="input-group">
                    <label for="nombre">Nombre completo</label>
                    <input id="nombre" type="text" required />
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" required />
                </div>

                <div class="input-group">
                    <label for="fecha-nacimiento">Fecha de nacimiento</label>
                    <input id="fecha-nacimiento" type="date" required />
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input id="password" type="password" required />
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirmar contraseña</label>
                    <input id="confirm-password" type="password" required />
                </div>

                <hr class="registro-divider" />

                <div class="btn-dropdown-wrapper">
                    <button type="submit" class="btn-principal">Regístrate</button>
                    
                    <div class="dropdown-content">
                        <p>¿Ya tienes cuenta?</p>
                        <a href="login.html">Iniciar sesión</a>
                        <hr class="linea-terminos">
                        <a href="#">Términos y condiciones</a>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <footer></footer>

    <script src="../js/layout.js"></script>
    <script src="../js/registro.js"></script>
</body>
</html>
